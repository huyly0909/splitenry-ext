<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splitenry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="9" height="20" rx="2" fill="url(#splitGrad1)"/>
            <rect x="13" y="2" width="9" height="9" rx="2" fill="url(#splitGrad2)"/>
            <rect x="13" y="13" width="9" height="9" rx="2" fill="url(#splitGrad3)"/>
            <defs>
              <linearGradient id="splitGrad1" x1="2" y1="2" x2="11" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a855f7"/>
                <stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
              <linearGradient id="splitGrad2" x1="13" y1="2" x2="22" y2="11" gradientUnits="userSpaceOnUse">
                <stop stop-color="#06b6d4"/>
                <stop offset="1" stop-color="#22d3ee"/>
              </linearGradient>
              <linearGradient id="splitGrad3" x1="13" y1="13" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#f472b6"/>
                <stop offset="1" stop-color="#fb923c"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="header-title">Splitenry</h1>
      </div>
    </header>

    <!-- Layout Grid -->
    <div class="layout-grid" id="layoutGrid">
      <!-- Rendered by popup.js -->
    </div>

    <!-- Quick Open Button -->
    <button class="quick-open-btn" id="btnQuickOpen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open Tiler Tab
    </button>

    <!-- Status Bar -->
    <footer class="status-bar" id="statusBar">
      <div class="status-left">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span id="statusText">Loading...</span>
      </div>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="toastMsg">Opening...</span>
    </div>
  </div>

  <script src="layouts.js"></script>
  <script src="popup.js"></script>
</body>
</html>
